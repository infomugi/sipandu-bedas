<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Assesment Lapangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .map-container { width: 100%; height: 180px; border-radius: 1rem; overflow: hidden; border: 1.5px solid #e2e8f0; margin-top: 0.75rem; }
    </style>
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">
    <div class="view-screen">
        <!-- Header -->
        <header class=" bg-white/90 backdrop-blur-xl border-b border-gray-200/50 sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
            <button onclick="history.back()" class="btn-back" aria-label="Kembali">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 class="page-title">Assesment Lapangan</h2>
                <p class="page-subtitle">Verifikasi Kondisi Lapangan</p>
            </div>
        </header>

        <main class="view-content" style="padding:1.25rem;">
            <!-- Target Card -->
            <div class="info-box info-box-emerald" style="margin-bottom:1.5rem;">
                <p style="font-size:0.625rem;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Sasaran Penerima</p>
                <h4 style="font-size:0.875rem;font-weight:800;color:#064e3b;margin-bottom:0.125rem;">ATANG OKTAVIANA</h4>
                <div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid rgba(16,185,129,0.1);">
                    <p class="caption-text" style="color:#059669;font-weight:600;"><i class="fa-solid fa-id-card mr-1"></i> ID #PRM-0082</p>
                    <p class="caption-text" style="color:#059669;font-weight:600;"><i class="fa-solid fa-location-dot mr-1"></i> RT 02 RW 11</p>
                </div>
            </div>

            <form id="assesmentForm">
                <!-- Foto KK -->
                <div class="form-group">
                    <label class="form-label">Foto Kartu Keluarga</label>
                    <div class="upload-area" onclick="document.getElementById('uploadKK').click()">
                        <div class="stat-icon" style="background:#f1f5f9;color:#94a3b8;width:3rem;height:3rem;">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                        <span class="caption-text" style="font-weight:700;color:#475569;">Ambil Foto / Upload KK</span>
                    </div>
                    <input type="file" id="uploadKK" class="step-hidden">
                </div>

                <!-- Foto Rumah -->
                <div class="form-group">
                    <label class="form-label">Foto Kondisi Rumah</label>
                    <div class="upload-area" onclick="document.getElementById('uploadRumah').click()">
                        <div class="stat-icon" style="background:#f1f5f9;color:#94a3b8;width:3rem;height:3rem;">
                            <i class="fa-solid fa-house-chimney"></i>
                        </div>
                        <span class="caption-text" style="font-weight:700;color:#475569;">Foto Kondisi Lapangan</span>
                    </div>
                    <input type="file" id="uploadRumah" class="step-hidden">
                </div>

                <!-- GPS -->
                <div class="form-group">
                    <div class="section-separator" style="margin-bottom:0.5rem;">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Titik Koordinat (GPS)</span>
                        <button type="button" onclick="getLocation()" class="btn-ghost-brand" style="margin-left:auto;font-size:0.625rem;text-transform:uppercase;">Refresh GPS</button>
                    </div>
                    <div class="map-container" id="map"></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;">
                        <input type="text" id="lat" class=" w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" style="font-size:0.7rem;padding:0.625rem;" placeholder="Latitude" readonly>
                        <input type="text" id="lng" class=" w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" style="font-size:0.7rem;padding:0.625rem;" placeholder="Longitude" readonly>
                    </div>
                </div>

                <!-- Deskripsi -->
                <div class="form-group">
                    <label class="form-label">Hasil Assesment / Temuan Lapangan</label>
                    <textarea class=" w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" style="height:6rem;resize:none;" placeholder="Jelaskan kondisi riil, alasan mendesak, atau temuan lainnya..."></textarea>
                </div>

                <div style="margin-top:2rem;">
                    <button type="button" onclick="location.href='index.html'" class=" bg-[#007AFF] hover:bg-[#0051B3] active:bg-[#004099] text-white font-semibold py-4 px-8 rounded-full shadow-lg shadow-blue-500/30 transition-all duration-200 active:scale-95">
                        <i class="fa-solid fa-paper-plane"></i> Kirim Hasil Assesment
                    </button>
                </div>
            </form>
        </main>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <button onclick="location.href='index.html'" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Beranda</span>
            </button>
            <button onclick="location.href='pendaftaran.html'" class="nav-item">
                <i class="fa-solid fa-users"></i>
                <span>Keluarga</span>
            </button>
            <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Riwayat</span>
            </button>
            <button class="nav-item active">
                <i class="fa-solid fa-clipboard-check"></i>
                <span>Verifikasi</span>
            </button>
            <button onclick="location.href='profil.html'" class="nav-item">
                <i class="fa-solid fa-user-circle"></i>
                <span>Profil</span>
            </button>
        </nav>
    </div>
</div>

<script>
    let map, marker;
    const defaultLocation = [-7.0252, 107.6190];

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView(defaultLocation, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OSM'
        }).addTo(map);

        marker = L.marker(defaultLocation, { draggable: true }).addTo(map);
        
        marker.on('dragend', function() {
            const pos = marker.getLatLng();
            updateCoords(pos.lat, pos.lng);
        });

        getLocation();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const pos = [lat, lng];
                    map.setView(pos, 17);
                    marker.setLatLng(pos);
                    updateCoords(lat, lng);
                },
                () => { console.log("Geolocation failed."); }
            );
        }
    }

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat.toFixed(7);
        document.getElementById('lng').value = lng.toFixed(7);
    }

    window.onload = initMap;
</script>

</body>
</html>
