<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - SPM Pendidikan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="antialiased">

<div class="app-container">

    <div class="view-screen">
        <!-- Header -->
        <header class="header-colored bg-header-emerald">
            <button onclick="history.back()" class="btn-back-light" aria-label="Kembali">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div>
                <h2 class="page-title">SPM Pendidikan</h2>
                <p class="page-subtitle">Bantuan Biaya / Fasilitas Belajar</p>
            </div>
        </header>

        <main class="view-content px-5 pt-4 pb-32">
            
            <div class="info-box info-box-blue" style="margin-bottom:1.5rem;">
                <h3 style="font-size:0.8125rem;font-weight:700;color:#1e3a5f;margin-bottom:0.5rem;">Pilih Anak / Penerima</h3>
                <p style="font-size:0.725rem;color:#3b82f6;line-height:1.5;font-weight:500;margin-bottom:0.75rem;">Pengajuan bantuan untuk anak putus sekolah, terkendala biaya, atau butuh seragam/alat tulis.</p>
                <select class="form-input" style="background:white;">
                    <option value="" disabled selected>-- Pilih Anggota Keluarga --</option>
                    <option>Budi (Lk, 6 Tahun - SD)</option>
                    <option>Susi (Pr, 13 Tahun - SMP)</option>
                </select>
            </div>

            <div class="form-group" style="margin-top:0.75rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                    <label class="form-label" style="margin-bottom:0;color:#3b82f6;">NIK Penerima / Anak</label>
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <span style="font-size:0.7rem;font-weight:600;color:#64748b;">Tidak Punya NIK?</span>
                        <div class="toggle-switch" id="nikTogglePendidikan" onclick="toggleNikInput('Pendidikan')"></div>
                    </div>
                </div>
                <input type="number" id="nikInputPendidikan" class="form-input" placeholder="16 digit NIK" style="background:#f0f9ff;border-color:#bae6fd;transition:all 0.3s;">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">Jenjang Pendidikan</label>
                    <select class="form-input">
                        <option>PAUD / TK</option>
                        <option>SD / MI</option>
                        <option>SMP / MTs</option>
                        <option>SMA / SMK / MA</option>
                        <option>Putus Sekolah</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Kelas</label>
                    <input type="text" class="form-input" placeholder="Cth: 1, 2, 3...">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Nama Institusi Sekolah (Jika Ada)</label>
                <input type="text" class="form-input" placeholder="Cth: SDN 1 Rancamanyar">
            </div>

            <div class="form-group">
                <label class="form-label">Jenis Bantuan yang Dibutuhkan</label>
                <select class="form-input">
                    <option>Pelunasan Tunggakan Biaya (SPP/Bangunan)</option>
                    <option>Seragam & Alat Tulis</option>
                    <option>Fasilitas Belajar (Kacamata, dll)</option>
                    <option>Beasiswa Lanjutan</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Keterangan / Alasan Pengajuan</label>
                <textarea class="form-input" style="height:5.5rem;resize:none;" placeholder="Jelaskan kondisi ekonomi atau kendala spesifik yang dialami..."></textarea>
            </div>
            
            <!-- Upload Bukti -->
            <div class="form-group">
                <label class="form-label">Upload Bukti (Tagihan / Surat Keterangan)</label>
                <div class="upload-area">
                    <i class="fa-solid fa-file-arrow-up" style="font-size:1.75rem;color:#cbd5e1;"></i>
                    <p style="font-size:0.75rem;font-weight:600;color:#94a3b8;">Pilih File Foto / Dokumen</p>
                </div>
            </div>

            <!-- Geolocation Map -->
            <div style="margin-top:1.5rem;">
                <div class="section-separator">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Lokasi Pelayanan (GPS)</span>
                </div>
                <div class="map-container" id="map">
                    <button type="button" class="map-overlay-btn" onclick="getLocation()">
                        <i class="fa-solid fa-crosshairs"></i> Fokus Lokasi
                    </button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;">
                    <input type="text" id="lat" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Latitude" readonly>
                    <input type="text" id="lng" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Longitude" readonly>
                </div>
            </div>

            <div class="form-group" style="margin-top:1.5rem;">
                <label class="form-label" style="color:#059669;font-weight:700;">Catatan Tambahan Kader</label>
                <textarea class="form-input" style="height:4rem;resize:none;" placeholder="Catatan internal kader..."></textarea>
            </div>
            
            <button onclick="location.href='spm-menu.html'" class="btn-primary btn-accent-blue" style="margin-top:2rem;width:100%;padding:0.9375rem 1.5rem;border-radius:0.875rem;border:none;font-weight:700;font-size:0.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;font-family:'Plus Jakarta Sans',sans-serif;">
                <i class="fa-solid fa-paper-plane"></i> Ajukan SPM Pendidikan
            </button>
        </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

<script>
    // Map & Geolocation logic
    let map, marker;
    const defaultLocation = [-7.0252, 107.6190]; // Baleendah, Bandung

    function initMap() {
        map = L.map('map').setView(defaultLocation, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        marker = L.marker(defaultLocation, {draggable: true}).addTo(map);
        
        marker.on('dragend', function() {
            const pos = marker.getLatLng();
            updateCoords(pos.lat, pos.lng);
        });

        // Try auto-locate on load
        getLocation();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const pos = [lat, lng];
                    map.setView(pos, 16);
                    marker.setLatLng(pos);
                    updateCoords(lat, lng);
                },
                () => {
                    console.log("Geolocation failed or denied.");
                }
            );
        }
    }

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat.toFixed(7);
        document.getElementById('lng').value = lng.toFixed(7);
    }

    function toggleNikInput(type) {
        const toggle = document.getElementById('nikToggle' + type);
        const input = document.getElementById('nikInput' + type);
        
        toggle.classList.toggle('active');
        
        if (toggle.classList.contains('active')) {
            input.disabled = true;
            input.value = '';
            input.placeholder = "Tidak Ada NIK";
            input.style.opacity = '0.6';
            input.style.backgroundColor = '#f1f5f9';
        } else {
            input.disabled = false;
            input.placeholder = "16 digit NIK";
            input.style.opacity = '1';
            input.style.backgroundColor = '#f0f9ff';
        }
    }

    window.onload = initMap;
</script>

</body>
</html>
