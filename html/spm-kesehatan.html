<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - SPM Kesehatan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <div class="view-screen" style="background:#f8fafc;display:flex;flex-direction:column;">
        <header class="header-white-nav">
            <button onclick="history.back()" class="btn-back" aria-label="Kembali">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 class="page-title">SPM Kesehatan</h2>
                <p class="page-subtitle">Pelayanan 5 Meja Posyandu</p>
            </div>
        </header>

        <main style="flex:1;overflow-y:auto;padding:1.25rem;padding-bottom:100px;">
            
            <!-- Target Info / Sasaran Selection -->
            <div class="info-box info-box-indigo" style="margin-bottom:1.5rem;">
                <p style="font-size:0.6875rem;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.625rem;">Pilih Sasaran</p>
                <select class="form-input" id="sasaranSelect" onchange="toggleSasaranFields()" style="margin-bottom:0.5rem;background:white;">
                    <option value="" disabled selected>-- Pilih Layanan Sasaran --</option>
                    <option value="balita">Bayi & Balita (0-59 Bulan)</option>
                    <option value="bumil">Ibu Hamil & Nifas</option>
                    <option value="pus">Pasangan Usia Subur (PUS)</option>
                    <option value="lansia">Lansia</option>
                </select>
                <select class="form-input" style="background:white;">
                    <option>Atang (Istri, Pr, 32 Thn)</option>
                </select>
                <div class="form-group" style="margin-top:0.75rem;">
                    <label class="form-label" style="color:#6366f1;">NIK Penerima / Sasaran</label>
                    <input type="number" class="form-input" placeholder="16 digit NIK" style="background:white;border-color:#e0e7ff;">
                </div>
            </div>

            <!-- Balita Fields -->
            <div id="fieldsBalita" class="sasaran-group" style="display:none;">
                <div class="card-section" style="margin-bottom:1rem;">
                    <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                        <i class="fa-solid fa-weight-scale" style="color:#059669;margin-right:0.375rem;font-size:0.75rem;"></i> Meja 2 & 3: Penimbangan & KMS
                    </h3>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                        <div class="form-group" style="margin-top:0;">
                            <label class="form-label">Berat Badan (Kg)</label>
                            <input type="number" step="0.1" class="form-input" placeholder="0.0">
                        </div>
                        <div class="form-group" style="margin-top:0;">
                            <label class="form-label">Tinggi Badan (Cm)</label>
                            <input type="number" step="0.1" class="form-input" placeholder="0.0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Status Garis Pita KMS</label>
                        <select class="form-input">
                            <option>Hijau (Naik Normal)</option>
                            <option>Kuning (Tiga Kali Tidak Naik / BGM)</option>
                            <option>Merah (Gizi Buruk)</option>
                        </select>
                    </div>
                </div>

                <div class="card-section" style="margin-bottom:1rem;">
                    <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                        <i class="fa-solid fa-syringe" style="color:#059669;margin-right:0.375rem;font-size:0.75rem;"></i> Meja 4: Imunisasi & PMT
                    </h3>
                    <div class="form-group" style="margin-top:0;">
                        <label class="form-label">Jenis Imunisasi Diberikan</label>
                        <select class="form-input">
                            <option>Tidak Ada</option>
                            <option>BCG</option>
                            <option>DPT-HB-Hib 1</option>
                            <option>Polio 1</option>
                            <option>Campak / MR</option>
                        </select>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;">
                        <label class="checkbox-card">
                            <input type="checkbox">
                            <span style="font-size:0.75rem;font-weight:600;color:#334155;">Terima Vit A</span>
                        </label>
                        <label class="checkbox-card">
                            <input type="checkbox">
                            <span style="font-size:0.75rem;font-weight:600;color:#334155;">Obat Cacing</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Ibu Hamil Fields -->
            <div id="fieldsBumil" class="sasaran-group" style="display:none;">
                <div class="card-section" style="margin-bottom:1rem;">
                    <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                        <i class="fa-solid fa-person-pregnant" style="color:#059669;margin-right:0.375rem;font-size:0.75rem;"></i> Pemeriksaan Ibu Hamil
                    </h3>
                    <div class="form-group" style="margin-top:0;">
                        <label class="form-label">Usia Kehamilan (Minggu)</label>
                        <input type="number" class="form-input" placeholder="Cth: 20">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                        <div class="form-group">
                            <label class="form-label">Tekanan Darah</label>
                            <input type="text" class="form-input" placeholder="120/80">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Lingkar Lengan (Cm)</label>
                            <input type="number" step="0.1" class="form-input" placeholder="24.5">
                        </div>
                    </div>
                    <p style="font-size:0.75rem;color:#e11d48;font-weight:600;font-style:italic;margin-top:0.75rem;">*LiLA &lt; 23.5 cm → indikasi KEK</p>
                </div>
            </div>

            <!-- Meja 5: Penyuluhan -->
            <div class="card-section" style="margin-bottom:1rem;background:#eff6ff;border-color:#dbeafe;">
                <h3 style="font-size:0.8125rem;font-weight:700;color:#1e3a5f;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #bfdbfe;">
                    <i class="fa-solid fa-clipboard-list" style="color:#3b82f6;margin-right:0.375rem;font-size:0.75rem;"></i> Meja 5: Penyuluhan & Tindak Lanjut
                </h3>
                <div class="form-group" style="margin-top:0;">
                    <label class="form-label">Hasil / Tindak Lanjut</label>
                    <textarea class="form-input" style="height:5rem;resize:none;" placeholder="Catatan kader..."></textarea>
                </div>
                <!-- Toggle Bantuan -->
                <div style="margin-top:1rem;display:flex;align-items:center;justify-content:space-between;background:white;padding:0.875rem;border-radius:0.875rem;border:1px solid #dbeafe;">
                    <div>
                        <p style="font-size:0.8125rem;font-weight:700;color:#1e293b;">Ajukan Bantuan</p>
                        <p style="font-size:0.75rem;color:#94a3b8;font-weight:500;">Kirim ke Desa/Puskesmas</p>
                    </div>
                    <div class="toggle-switch" id="toggleBantuan" onclick="this.classList.toggle('active')"></div>
                </div>

                <!-- Geolocation Map -->
                <div style="margin-top:1.5rem;">
                    <div class="section-separator">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Lokasi Pelayanan (GPS)</span>
                    </div>
                    <div class="map-container" id="map">
                        <button type="button" class="map-overlay-btn" onclick="getLocation()">
                            <i class="fa-solid fa-crosshairs"></i> Fokus Lokasi
                        </button>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;">
                        <input type="text" id="lat" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Latitude" readonly>
                        <input type="text" id="lng" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Longitude" readonly>
                    </div>
                </div>
            </div>

            <div class="card-section" style="margin-bottom:1.5rem;">
                <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                    <i class="fa-solid fa-note-sticky" style="color:#059669;margin-right:0.375rem;font-size:0.75rem;"></i> Keterangan / Catatan Tambahan
                </h3>
                <div class="form-group" style="margin-top:0;">
                    <textarea class="form-input" style="height:4rem;resize:none;" placeholder="Keterangan tambahan jika ada..."></textarea>
                </div>
            </div>

            <button onclick="location.href='spm-menu.html'" class="btn-primary" style="margin-top:0.5rem;">
                <i class="fa-solid fa-floppy-disk"></i> Simpan Pelayanan
            </button>
        </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-user-circle"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

<script>
    // Map & Geolocation logic
    let map, marker;
    const defaultLocation = [-7.0252, 107.6190]; // Baleendah, Bandung

    function initMap() {
        map = L.map('map').setView(defaultLocation, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        marker = L.marker(defaultLocation, {draggable: true}).addTo(map);
        
        marker.on('dragend', function() {
            const pos = marker.getLatLng();
            updateCoords(pos.lat, pos.lng);
        });

        // Try auto-locate on load
        getLocation();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const pos = [lat, lng];
                    map.setView(pos, 16);
                    marker.setLatLng(pos);
                    updateCoords(lat, lng);
                },
                () => {
                    console.log("Geolocation failed or denied.");
                }
            );
        }
    }

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat.toFixed(7);
        document.getElementById('lng').value = lng.toFixed(7);
    }

    window.onload = initMap;

    function toggleSasaranFields() {
        document.querySelectorAll('.sasaran-group').forEach(el => el.style.display = 'none');
        const selected = document.getElementById('sasaranSelect').value;
        if(selected === 'balita') document.getElementById('fieldsBalita').style.display = 'block';
        else if(selected === 'bumil') document.getElementById('fieldsBumil').style.display = 'block';
    }
</script>

</body>
</html>
