<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - SPM Trantibumlinmas</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <div class="view-screen" style="background:#f8fafc;display:flex;flex-direction:column;">
        <header class="header-white-nav">
            <button onclick="history.back()" class="btn-back" aria-label="Kembali">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 class="page-title">SPM Trantibumlinmas</h2>
                <p class="page-subtitle">Pengaduan Keamanan & Ketertiban</p>
            </div>
        </header>

        <main style="flex:1;overflow-y:auto;padding:1.25rem;padding-bottom:100px;">
            
            <div class="info-box info-box-rose" style="margin-bottom:1.5rem;display:flex;gap:0.75rem;align-items:flex-start;">
                <i class="fa-solid fa-shield-halved" style="color:#e11d48;margin-top:0.125rem;flex-shrink:0;"></i>
                <p style="font-size:0.75rem;color:#9f1239;font-weight:500;line-height:1.5;">Kerahasiaan dan keselamatan pelapor dijamin oleh negara. Jika melapor secara anonim tanpa kontak, pengaduan dapat diabaikan.</p>
            </div>

            <div class="form-group" style="margin-top:0;">
                <label class="form-label">Kategori Laporan</label>
                <select class="form-input">
                    <option>Kebakaran</option>
                    <option>KDRT / Asusila / Trafficking</option>
                    <option>Bencana Alam</option>
                    <option>Narkoba / Premanisme</option>
                    <option>Illegal Logging / Illegal Fishing</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Detail Kejadian</label>
                <textarea class="form-input" style="height:6rem;resize:none;" placeholder="Jelaskan apa yang terjadi, lokasi, dan waktu kejadian..."></textarea>
            </div>

            <!-- Geolocation Map -->
            <div style="margin-top:1.5rem;">
                <div class="section-separator">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Lokasi Pelayanan (GPS)</span>
                </div>
                <div class="map-container" id="map">
                    <button type="button" class="map-overlay-btn" onclick="getLocation()">
                        <i class="fa-solid fa-crosshairs"></i> Fokus Lokasi
                    </button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;">
                    <input type="text" id="lat" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Latitude" readonly>
                    <input type="text" id="lng" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Longitude" readonly>
                </div>
            </div>

            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-top:1.75rem;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-user-shield" style="color:#e11d48;margin-right:0.375rem;"></i> Identitas Pelapor
            </h3>
            
            <!-- Toggle Anonim -->
            <div style="display:flex;align-items:center;justify-content:space-between;background:white;padding:0.875rem;border-radius:0.875rem;border:1px solid #e2e8f0;margin-bottom:1rem;">
                <div>
                    <p style="font-size:0.8125rem;font-weight:700;color:#1e293b;">Sembunyikan Identitas</p>
                    <p style="font-size:0.75rem;color:#94a3b8;font-weight:500;">Laporkan secara anonim</p>
                </div>
                <div class="toggle-switch" id="anonimToggle" onclick="toggleAnonim()"></div>
            </div>

            <div id="formIdentitas">
                <div class="form-group" style="margin-top:0;">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-input" placeholder="Masukkan nama lengkap">
                </div>
                <div class="form-group">
                    <label class="form-label">NIK Pelapor</label>
                    <input type="number" class="form-input" placeholder="16 digit NIK">
                </div>
                <div class="form-group">
                    <label class="form-label">Nomor Kontak (Bisa Dihubungi)</label>
                    <input type="tel" class="form-input" placeholder="08xxxxxxxxxx">
                </div>
                </div>
            </div>

            <div class="form-group" style="margin-top:1.5rem;">
                <label class="form-label" style="color:#059669;font-weight:700;">Catatan Tambahan Kader</label>
                <textarea class="form-input" style="height:4rem;resize:none;" placeholder="Catatan internal jika ada..."></textarea>
            </div>

            <button onclick="location.href='spm-menu.html'" class="btn-primary btn-accent-rose" style="margin-top:2rem;width:100%;padding:0.9375rem 1.5rem;border-radius:0.875rem;border:none;font-weight:700;font-size:0.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;font-family:'Plus Jakarta Sans',sans-serif;">
                <i class="fa-solid fa-bullhorn"></i> Kirim Pengaduan Trantibum
            </button>
        </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-user-circle"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

<script>
    // Map & Geolocation logic
    let map, marker;
    const defaultLocation = [-7.0252, 107.6190]; // Baleendah, Bandung

    function initMap() {
        map = L.map('map').setView(defaultLocation, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        marker = L.marker(defaultLocation, {draggable: true}).addTo(map);
        
        marker.on('dragend', function() {
            const pos = marker.getLatLng();
            updateCoords(pos.lat, pos.lng);
        });

        // Try auto-locate on load
        getLocation();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const pos = [lat, lng];
                    map.setView(pos, 16);
                    marker.setLatLng(pos);
                    updateCoords(lat, lng);
                },
                () => {
                    console.log("Geolocation failed or denied.");
                }
            );
        }
    }

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat.toFixed(7);
        document.getElementById('lng').value = lng.toFixed(7);
    }

    window.onload = initMap;

    function toggleAnonim() {
        const toggle = document.getElementById('anonimToggle');
        const form = document.getElementById('formIdentitas');
        toggle.classList.toggle('active');
        if (toggle.classList.contains('active')) {
            form.style.opacity = '0.3';
            form.style.pointerEvents = 'none';
        } else {
            form.style.opacity = '1';
            form.style.pointerEvents = 'auto';
        }
    }
</script>

</body>
</html>
