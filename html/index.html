<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background-color: var(--ios-gray-100, #F2F2F7);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .header-premium {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4rem 1.5rem 1rem 1.5rem;
            color: var(--ios-gray-900, #1C1C1E);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .pro-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .stat-badge {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .menu-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: left;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
        }
        .menu-btn:active {
            transform: scale(0.97);
            background-color: var(--ios-gray-100, #F2F2F7);
        }
        .menu-btn-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
        }
        .view-content {
            background: transparent;
            position: relative;
            z-index: 10;
            padding-bottom: 90px;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

<div class="app-container">

    <!-- Header Section (iOS Navigation Bar) -->
    <header class="header-premium">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full overflow-hidden shadow-sm">
                    <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-lg font-semibold tracking-tight">Angga Sura Sendana</h1>
                    <div class="flex items-center gap-1 text-gray-500">
                        <i class="fa-solid fa-location-dot text-[10px]"></i>
                        <span class="text-xs font-medium">Baleendah, Bandung</span>
                    </div>
                </div>
            </div>
            <div class="flex space-x-2">
                <button onclick="location.href='profil.html'" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 active:bg-gray-300 transition-colors">
                    <i class="fa-regular fa-bell text-gray-700"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="view-content mt-4">
        <!-- iOS Info Banner -->
        <section class="px-5 mb-6">
            <div class="pro-card flex items-center justify-between p-4 bg-white/90">
                <div>
                    <p class="text-[10px] uppercase tracking-wider font-semibold text-gray-500 mb-1">Posyandu RW 11</p>
                    <p class="text-sm font-semibold text-gray-900 leading-tight">Kelurahan Rancamanyar</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 font-medium mb-1">Status Kader</p>
                    <span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-semibold">AKTIF</span>
                </div>
            </div>
        </section>

        <!-- Banner Section -->
        <section class="px-5 mb-6">
            <div class="w-full aspect-[21/9] rounded-2xl overflow-hidden shadow-lg shadow-black/5 relative border border-white/20">
                <img src="sipandu_bedas_dashboard_banner_mockup_1773292728208.png" alt="Banner" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <div class="absolute bottom-4 left-4 right-4 text-white">
                    <p class="text-[10px] font-semibold uppercase tracking-wider mb-1 opacity-90">Info Terkini</p>
                    <p class="text-sm font-semibold leading-tight">Pengajuan SPM kini lebih cepat & transparan</p>
                </div>
            </div>
        </section>

        <!-- Stats Section -->
        <section class="px-5 mb-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="pro-card">
                    <div class="stat-badge bg-blue-50 text-[#007AFF]">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-900">42</p>
                        <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mt-1">Keluarga</p>
                    </div>
                </div>
                <div class="pro-card">
                    <div class="stat-badge bg-green-50 text-[#34C759]">
                        <i class="fa-solid fa-clipboard-check"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-900">18</p>
                        <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mt-1">Layanan</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Menu Grid (iOS List Items) -->
        <section class="px-5 mb-8">
            <div class="flex items-center justify-between mb-2 px-1">
                <h3 class="text-[13px] font-semibold text-gray-500 uppercase tracking-wider">Layanan Utama</h3>
                <span class="text-[13px] font-medium text-[#007AFF]">Lihat Semua</span>
            </div>
            <div class="divide-y divide-gray-200/50 bg-white/90 backdrop-blur-xl rounded-2xl border border-white/20 shadow-lg shadow-black/5 overflow-hidden">
                <button onclick="location.href='pendaftaran.html'" class="w-full flex items-center justify-between p-4 hover:bg-gray-50/50 active:bg-gray-100 transition-colors cursor-pointer text-left focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center text-white shadow-sm">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-gray-900 text-[15px]">Pendaftaran Keluarga</h4>
                            <p class="text-[13px] text-gray-500 mt-0.5">Input data warga & KK baru</p>
                        </div>
                    </div>
                    <span class="text-gray-300 text-lg">›</span>
                </button>

                <button onclick="location.href='spm-menu.html'" class="w-full flex items-center justify-between p-4 hover:bg-gray-50/50 active:bg-gray-100 transition-colors cursor-pointer text-left focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#007AFF] to-blue-500 flex items-center justify-center text-white shadow-sm">
                            <i class="fa-solid fa-list-check"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-gray-900 text-[15px]">6 Layanan SPM</h4>
                            <p class="text-[13px] text-gray-500 mt-0.5">Pendidikan, Kesehatan, Sosial, dll</p>
                        </div>
                    </div>
                    <span class="text-gray-300 text-lg">›</span>
                </button>

                <button onclick="location.href='verifikasi-desa.html'" class="w-full flex items-center justify-between p-4 hover:bg-gray-50/50 active:bg-gray-100 transition-colors cursor-pointer text-left focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#FF9500] to-orange-400 flex items-center justify-center text-white shadow-sm">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-gray-900 text-[15px]">Verifikasi Data</h4>
                            <p class="text-[13px] text-gray-500 mt-0.5">Cek validasi data lapangan</p>
                        </div>
                    </div>
                    <span class="text-gray-300 text-lg">›</span>
                </button>

                <button onclick="location.href='laporan.html'" class="w-full flex items-center justify-between p-4 hover:bg-gray-50/50 active:bg-gray-100 transition-colors cursor-pointer text-left focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#FF3B30] to-red-500 flex items-center justify-center text-white shadow-sm">
                            <i class="fa-solid fa-chart-pie"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-gray-900 text-[15px]">Laporan & Statistik</h4>
                            <p class="text-[13px] text-gray-500 mt-0.5">Rekapitulasi pencapaian target</p>
                        </div>
                    </div>
                    <span class="text-gray-300 text-lg">›</span>
                </button>
            </div>
        </section>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
