<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Profil</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .profile-header-dark {
            background: linear-gradient(180deg, #064e3b 0%, #065f46 100%);
            padding: 4rem 1.5rem 6rem 1.5rem;
            color: white;
            text-align: center;
            position: relative;
        }
        .profile-card-container {
            margin-top: -4rem;
            padding: 0 1.5rem 6rem 1.5rem;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

<div class="app-container">

    <div class="view-content">
        <!-- Header -->
        <div class="profile-header-dark">
            <div class="flex justify-between items-center absolute top-12 left-5 right-5">
                <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md">
                    <i class="fa-solid fa-chevron-left text-white"></i>
                </button>
                <h1 class="text-lg font-bold">Account</h1>
                <button class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md relative">
                    <i class="fa-regular fa-bell text-white"></i>
                    <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#064e3b]"></span>
                </button>
            </div>
            
            <div class="mt-8">
                <div class="w-24 h-24 rounded-full mx-auto relative mb-4">
                    <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-full h-full object-cover rounded-full border-4 border-white/10 shadow-xl">
                    <button class="absolute bottom-1 right-1 w-8 h-8 bg-white text-slate-800 rounded-full flex items-center justify-center shadow-lg border-2 border-slate-900 transition-transform active:scale-95">
                        <i class="fa-solid fa-camera text-xs"></i>
                    </button>
                </div>
                <h2 class="text-xl font-bold tracking-tight">Angga Sura Sendana</h2>
                <p class="text-sm text-emerald-100/60 font-medium">angga.surasendana@gmail.com</p>
            </div>
        </div>

        <div class="profile-card-container">
            <!-- Action Cards Group 1 -->
            <div class="divide-y divide-gray-100 bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 mb-6">
                <button aria-label="Informasi Pribadi" class="w-full text-left flex items-center justify-between p-4 hover:bg-gray-50/50 transition-colors focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset rounded-t-2xl">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100 flex items-center justify-center text-lg">
                            <i class="fa-regular fa-id-card"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-[15px] text-gray-900">Informasi Pribadi</h4>
                            <p class="text-[13px] text-gray-500">Nama, Email, dan Alamat</p>
                        </div>
                    </div>
                    <span class="text-gray-400">›</span>
                </button>
                <button aria-label="Keamanan & Privasi" onclick="location.href='forgot-password.html'" class="w-full text-left flex items-center justify-between p-4 hover:bg-gray-50/50 transition-colors focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 border border-blue-100 flex items-center justify-center text-lg">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-[15px] text-gray-900">Keamanan & Privasi</h4>
                            <p class="text-[13px] text-gray-500">Kata sandi dan autentikasi</p>
                        </div>
                    </div>
                    <span class="text-gray-400">›</span>
                </button>
                <button aria-label="Penugasan Posyandu" class="w-full text-left flex items-center justify-between p-4 hover:bg-gray-50/50 transition-colors focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset rounded-b-2xl">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-amber-50 text-amber-600 border border-amber-100 flex items-center justify-center text-lg">
                            <i class="fa-regular fa-hospital"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-[15px] text-gray-900">Penugasan Posyandu</h4>
                            <p class="text-[13px] text-gray-500">Wilayah kerja kader</p>
                        </div>
                    </div>
                    <span class="text-gray-400">›</span>
                </button>
            </div>

            <!-- Action Cards Group 2 (Settings) -->
            <div class="divide-y divide-gray-100 bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 mb-6">
                <div class="flex items-center justify-between p-4 bg-white/80 rounded-t-2xl">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-rose-50 text-rose-500 border border-rose-100 flex items-center justify-center text-lg">
                            <i class="fa-regular fa-bell"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-[15px] text-gray-900">Notifikasi Push</h4>
                            <p class="text-[13px] text-gray-500">Dapatkan update terbaru</p>
                        </div>
                    </div>
                    <button
                        role="switch"
                        aria-checked="true"
                        onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked') === 'true' ? 'false' : 'true'); this.classList.toggle('bg-[#34C759]'); this.classList.toggle('bg-gray-300'); this.querySelector('span').classList.toggle('translate-x-5'); this.querySelector('span').classList.toggle('translate-x-0')"
                        class="relative w-12 h-7 rounded-full transition-colors duration-300 bg-[#34C759] focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-offset-2"
                    >
                        <span class="absolute top-0.5 left-0.5 w-6 h-6 rounded-full bg-white shadow-md transform transition-transform duration-300 translate-x-5"></span>
                    </button>
                </div>
                <button aria-label="Pusat Bantuan" class="w-full text-left flex items-center justify-between p-4 hover:bg-gray-50/50 transition-colors focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 border border-slate-200 flex items-center justify-center text-lg">
                            <i class="fa-solid fa-circle-question"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-[15px] text-gray-900">Pusat Bantuan</h4>
                            <p class="text-[13px] text-gray-500">FAQ dan layanan dukungan</p>
                        </div>
                    </div>
                    <span class="text-gray-400">›</span>
                </button>
                <button aria-label="Bahasa" class="w-full text-left flex items-center justify-between p-4 hover:bg-gray-50/50 transition-colors focus:outline-none focus:ring-2 focus:ring-[#007AFF] focus:ring-inset rounded-b-2xl">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-600 border border-purple-100 flex items-center justify-center text-lg">
                            <i class="fa-solid fa-language"></i>
                        </div>
                        <div>
                            <h4 class="font-medium text-[15px] text-gray-900">Bahasa</h4>
                            <p class="text-[13px] text-gray-500">Bahasa Indonesia</p>
                        </div>
                    </div>
                    <span class="text-gray-400">›</span>
                </button>
            </div>

            <!-- Logout Button -->
            <button onclick="location.href='login.html'" class="w-full text-left flex items-center justify-center text-[#FF3B30] font-semibold py-4 px-6 rounded-2xl bg-[#FF3B30]/10 hover:bg-[#FF3B30]/20 active:bg-[#FF3B30]/30 transition-all focus:outline-none focus:ring-2 focus:ring-[#FF3B30] focus:ring-offset-2">
                Keluar Aplikasi
            </button>
            
            <p class="text-center text-[10px] text-slate-400 font-bold tracking-widest uppercase py-8">Sipandu Bedas v1.2.4</p>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button class="nav-item active">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
