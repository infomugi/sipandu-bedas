<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Profil</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .profile-header-dark {
            background-color: #121212;
            padding: 4rem 1.5rem 6rem 1.5rem;
            color: white;
            text-align: center;
            position: relative;
        }
        .profile-card-container {
            margin-top: -4rem;
            padding: 0 1.5rem 6rem 1.5rem;
            position: relative;
            z-index: 10;
        }
        .menu-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
        }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.15rem 1.25rem;
            transition: background-color 0.2s;
            position: relative;
        }
        .menu-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 4.75rem;
            right: 1.25rem;
            height: 1px;
            background-color: #f1f5f9;
        }
        .menu-item:last-child::after {
            display: none;
        }
        .menu-item:active {
            background-color: #f8fafc;
        }
        .icon-box {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f5;
            color: #52525b;
            font-size: 1.15rem;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background-color: #e4e4e7;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .toggle-switch.active {
            background-color: #10b981;
        }
        .toggle-switch.active::after {
            left: 22px;
        }
        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #f43f5e;
            font-weight: 700;
            padding: 1.15rem 1.25rem;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

<div class="app-container">

    <div class="view-content">
        <!-- Header -->
        <div class="profile-header-dark">
            <div class="flex justify-between items-center absolute top-12 left-5 right-5">
                <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md">
                    <i class="fa-solid fa-chevron-left text-white"></i>
                </button>
                <h1 class="text-lg font-bold">Account</h1>
                <button class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md relative">
                    <i class="fa-regular fa-bell text-white"></i>
                    <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#121212]"></span>
                </button>
            </div>
            
            <div class="mt-8">
                <div class="w-24 h-24 rounded-full mx-auto relative mb-4">
                    <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-full h-full object-cover rounded-full border-4 border-white/10 shadow-xl">
                    <button class="absolute bottom-1 right-1 w-8 h-8 bg-white text-slate-800 rounded-full flex items-center justify-center shadow-lg border-2 border-slate-900 transition-transform active:scale-95">
                        <i class="fa-solid fa-camera text-xs"></i>
                    </button>
                </div>
                <h2 class="text-xl font-bold tracking-tight">Hansah Darmawan</h2>
                <p class="text-sm text-slate-400 font-medium">hansah.darmawan@gmail.com</p>
            </div>
        </div>

        <div class="profile-card-container">
            <!-- Action Cards Group 1 -->
            <div class="menu-card">
                <div class="menu-item cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-regular fa-id-card"></i></div>
                        <div>
                            <p class="text-[14px] font-medium text-slate-700">Personal Information</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-[12px]"></i>
                </div>
                <div class="menu-item cursor-pointer" onclick="location.href='forgot-password.html'">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-solid fa-shield-halved"></i></div>
                        <div>
                            <p class="text-[14px] font-medium text-slate-700">Security & Privacy</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-[12px]"></i>
                </div>
                <div class="menu-item cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-regular fa-hospital"></i></div>
                        <div>
                            <p class="text-[14px] font-medium text-slate-700">Posyandu Assignment</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-[12px]"></i>
                </div>
            </div>

            <!-- Action Cards Group 2 (Settings) -->
            <div class="menu-card">
                <div class="menu-item">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-regular fa-bell"></i></div>
                        <div>
                            <p class="text-[14px] font-medium text-slate-700">Push Notifications</p>
                        </div>
                    </div>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="menu-item cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-solid fa-circle-question"></i></div>
                        <div>
                            <p class="text-[14px] font-medium text-slate-700">Help Center & FAQ</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-[12px]"></i>
                </div>
                <div class="menu-item cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-solid fa-quote-left"></i></div>
                        <div>
                            <p class="text-[14px] font-medium text-slate-700">Language</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[13px] text-slate-400 font-medium">Bahasa Indo</span>
                        <i class="fa-solid fa-chevron-right text-slate-300 text-[12px]"></i>
                    </div>
                </div>
            </div>

            <!-- Logout Button -->
            <button onclick="location.href='login.html'" class="btn-logout active:scale-95 transition-transform">
                <div class="icon-box bg-rose-50 text-rose-500"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
                <span>Keluar dari Aplikasi</span>
            </button>
            
            <p class="text-center text-[10px] text-slate-400 font-bold tracking-widest uppercase py-8">Sipandu Bedas v1.2.4</p>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button class="nav-item active">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
