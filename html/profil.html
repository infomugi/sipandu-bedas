<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Profil</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 900: '#064e3b' },
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e2e8f0; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        
        .app-container {
            max-width: 414px; margin: 0 auto; background-color: #f8fafc;
            height: 100vh; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        @media (min-width: 640px) {
            .app-container {
                height: 850px; margin-top: 2rem; margin-bottom: 2rem;
                border-radius: 40px; border: 12px solid #0f172a; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        .view-content {
            flex: 1; overflow-y: auto; padding-bottom: 80px;
        }

        .btn-press:active { transform: scale(0.96); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(241, 245, 249, 0.8); position: absolute; bottom: 0; width: 100%; z-index: 50;
        }

        .profile-header {
            background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
            padding: 3rem 1.5rem 4rem 1.5rem; border-bottom-left-radius: 2rem; border-bottom-right-radius: 2rem;
            color: white; text-align: center; position: relative;
        }

        .setting-item {
            display: flex; items-center; justify-content: space-between; padding: 1rem; border-bottom: 1px solid #f1f5f9;
        }
        .setting-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="antialiased text-slate-800">

<div class="app-container">

    <div class="view-content">
        <!-- Header -->
        <div class="profile-header">
            <button onclick="history.back()" class="absolute left-5 top-12 w-8 h-8 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm btn-press">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <div class="w-24 h-24 rounded-full bg-white mx-auto mb-4 p-1 relative shadow-lg">
                <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-full h-full object-cover rounded-full">
                <button class="absolute bottom-0 right-0 w-8 h-8 bg-indigo-600 text-white rounded-full border-2 border-white flex items-center justify-center text-xs btn-press">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            <h2 class="text-xl font-bold">HANSAH DARMAWAN</h2>
            <p class="text-[10px] text-emerald-100 font-medium">Kader Posyandu Tingkat RW</p>
            <p class="text-[10px] font-bold mt-1 bg-white/10 inline-block px-3 py-1 rounded-full border border-white/20">RW 11 | Desa RANCAMANYAR</p>
        </div>

        <div class="px-5 -mt-6 relative z-10 space-y-4">
            
            <!-- Account Section -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Akun Saya</h3>
                </div>
                <div class="setting-item btn-press cursor-pointer">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center"><i class="fa-regular fa-user"></i></div>
                        <p class="text-xs font-bold text-slate-700">Edit Informasi Pribadi</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                </div>
                <div class="setting-item btn-press cursor-pointer" onclick="location.href='forgot-password.html'">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center"><i class="fa-solid fa-lock"></i></div>
                        <p class="text-xs font-bold text-slate-700">Ubah Password</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                </div>
            </div>

            <!-- Settings Section -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pengaturan</h3>
                </div>
                <div class="setting-item">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center"><i class="fa-regular fa-bell"></i></div>
                        <p class="text-xs font-bold text-slate-700">Notifikasi</p>
                    </div>
                    <!-- Toggle Simulation -->
                    <div class="w-10 h-6 bg-emerald-500 rounded-full relative cursor-pointer">
                        <div class="w-4 h-4 bg-white rounded-full absolute right-1 top-1"></div>
                    </div>
                </div>
                <div class="setting-item btn-press cursor-pointer">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center"><i class="fa-solid fa-circle-info"></i></div>
                        <p class="text-xs font-bold text-slate-700">Bantuan & FAQ</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                </div>
            </div>

            <button onclick="location.href='login.html'" class="w-full py-4 bg-rose-50 text-rose-600 font-bold rounded-2xl flex items-center justify-center gap-2 btn-press border border-rose-100 mt-6">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar
            </button>
            <p class="text-center text-[10px] text-slate-400 font-medium py-4">Versi Aplikasi 1.0.0</p>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="glass-nav px-8 py-5 flex justify-between items-center text-slate-400">
        <button onclick="location.href='index.html'" class="flex flex-col items-center gap-1 hover:text-emerald-600 w-16">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[9px] font-bold">Beranda</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="flex flex-col items-center gap-1 hover:text-emerald-600 w-16">
            <i class="fa-solid fa-clock-rotate-left text-xl"></i>
            <span class="text-[9px] font-bold">Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="flex flex-col items-center gap-1 hover:text-emerald-600 w-16">
            <i class="fa-solid fa-chart-pie text-xl"></i>
            <span class="text-[9px] font-bold">Laporan</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-emerald-600 w-16">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[9px] font-bold">Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
