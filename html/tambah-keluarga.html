<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Tambah Data Keluarga</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <!-- Header -->
    <header class="header-white-nav">
        <button onclick="location.href='pendaftaran.html'" class="btn-back" aria-label="Kembali">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div>
            <h2 class="page-title">Tambah Keluarga</h2>
            <p class="page-subtitle">Form pendaftaran data keluarga baru</p>
        </div>
    </header>

    <div class="view-content" style="padding:1.25rem;padding-bottom:2rem;">
        
        <div class="form-group" style="margin-top:0;">
            <label class="form-label">Nomor Kartu Keluarga (KK)</label>
            <input type="text" class="form-input" placeholder="Masukkan No. KK">
        </div>

        <!-- Section: Anggota Keluarga -->
        <div class="card-section" style="margin-top:1.5rem;">
            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-user" style="color:#6366f1;margin-right:0.375rem;font-size:0.75rem;"></i> Informasi Anggota Keluarga
            </h3>
            
            <div class="form-group" style="margin-top:0;">
                <label class="form-label">NIK</label>
                <input type="text" class="form-input" placeholder="Masukkan NIK">
            </div>
            <div class="form-group">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-input" placeholder="Masukkan nama lengkap">
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">Jenis Kelamin</label>
                    <select class="form-input">
                        <option>Laki-laki</option>
                        <option>Perempuan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Status dalam Keluarga</label>
                <select class="form-input">
                    <option>Kepala Keluarga</option>
                    <option>Istri</option>
                    <option>Anak</option>
                    <option>Lainnya</option>
                </select>
            </div>
        </div>

        <!-- Section: Data Sosial Ekonomi -->
        <div class="card-section" style="margin-top:1rem;">
            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-chart-line" style="color:#059669;margin-right:0.375rem;font-size:0.75rem;"></i> Data Sosial Ekonomi
            </h3>
            
            <div class="form-group" style="margin-top:0;">
                <label class="form-label">Status Kesejahteraan</label>
                <select class="form-input">
                    <option>Pra-Sejahtera (Sangat Miskin)</option>
                    <option>Keluarga Sejahtera I (Miskin)</option>
                    <option>Keluarga Sejahtera II (Menengah)</option>
                    <option>Keluarga Sejahtera III (Mampu)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Status Asuransi Kesehatan</label>
                <select class="form-input">
                    <option>BPJS Kesehatan (PBI / Gratis)</option>
                    <option>BPJS Mandiri</option>
                    <option>Asuransi Swasta</option>
                    <option>Tidak Memiliki</option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">Pekerjaan</label>
                    <input type="text" class="form-input" placeholder="Cth: Buruh Tani">
                </div>
                <div class="form-group">
                    <label class="form-label">Estimasi Pendapatan</label>
                    <select class="form-input">
                        <option>&lt; Rp 1 Juta</option>
                        <option>Rp 1 - 3 Juta</option>
                        <option>&gt; Rp 3 Juta</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Section: Alamat -->
        <div class="form-group" style="margin-top:1.5rem;">
            <label class="form-label">Alamat Lengkap</label>
            <textarea class="form-input" style="height:5rem;resize:none;" placeholder="Masukkan alamat lengkap"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div class="form-group">
                <label class="form-label">RT</label>
                <input type="text" class="form-input" value="11">
            </div>
            <div class="form-group">
                <label class="form-label">RW</label>
                <input type="text" class="form-input" value="3">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Kecamatan</label>
            <select class="form-input"><option>BALEENDAH</option></select>
        </div>
        <div class="form-group">
            <label class="form-label">Desa</label>
            <select class="form-input"><option>RANCAMANYAR</option></select>
        </div>

        <button onclick="location.href='pendaftaran.html'" class="btn-primary" style="margin-top:2rem;">
            <i class="fa-solid fa-floppy-disk"></i> Simpan Keluarga
        </button>
    </div>

</div>

</body>
</html>
