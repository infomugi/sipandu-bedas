<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Tambah Data Keluarga</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <!-- Header -->
    <header class="header-white-nav">
        <button onclick="location.href='pendaftaran.html'" class="btn-back" aria-label="Kembali">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div>
            <h2 class="page-title">Tambah Keluarga</h2>
            <p class="page-subtitle">Form pendaftaran data keluarga baru</p>
        </div>
    </header>

    <div class="view-content" style="padding:1.25rem;padding-bottom:2rem;">
        
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-6 mb-4">
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">Nomor Kartu Keluarga (KK)</label>
                <input type="text" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" placeholder="Masukkan No. KK">
            </div>
        </div>

        <!-- Section: Anggota Keluarga -->
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-6 mb-4">
            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-user" style="color:#6366f1;margin-right:0.375rem;font-size:0.75rem;"></i> Informasi Anggota Keluarga
            </h3>
            
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">NIK</label>
                <input type="text" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" placeholder="Masukkan NIK">
            </div>
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">Nama Lengkap</label>
                <input type="text" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" placeholder="Masukkan nama lengkap">
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;" class="mb-4">
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700 ml-4">Jenis Kelamin</label>
                    <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
                        <option>Laki-laki</option>
                        <option>Perempuan</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700 ml-4">Tanggal Lahir</label>
                    <input type="date" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-sm font-medium text-gray-700 ml-4">Status dalam Keluarga</label>
                <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
                    <option>Kepala Keluarga</option>
                    <option>Istri</option>
                    <option>Anak</option>
                    <option>Lainnya</option>
                </select>
            </div>
        </div>

        <!-- Section: Data Sosial Ekonomi -->
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-6 mb-4">
            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-chart-line" style="color:#059669;margin-right:0.375rem;font-size:0.75rem;"></i> Data Sosial Ekonomi
            </h3>
            
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">Status Kesejahteraan</label>
                <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
                    <option>Pra-Sejahtera (Sangat Miskin)</option>
                    <option>Keluarga Sejahtera I (Miskin)</option>
                    <option>Keluarga Sejahtera II (Menengah)</option>
                    <option>Keluarga Sejahtera III (Mampu)</option>
                </select>
            </div>
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">Status Asuransi Kesehatan</label>
                <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
                    <option>BPJS Kesehatan (PBI / Gratis)</option>
                    <option>BPJS Mandiri</option>
                    <option>Asuransi Swasta</option>
                    <option>Tidak Memiliki</option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700 ml-4">Pekerjaan</label>
                    <input type="text" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" placeholder="Cth: Buruh Tani">
                </div>
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700 ml-4">Estimasi Pendapatan</label>
                    <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
                        <option>&lt; Rp 1 Juta</option>
                        <option>Rp 1 - 3 Juta</option>
                        <option>&gt; Rp 3 Juta</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Section: Alamat -->
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-6 mb-4">
            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-bottom:1rem;padding-bottom:0.625rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-map-location-dot" style="color:#f59e0b;margin-right:0.375rem;font-size:0.75rem;"></i> Alamat
            </h3>
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">Alamat Lengkap</label>
                <textarea class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" style="height:5rem;resize:none;" placeholder="Masukkan alamat lengkap"></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;" class="mb-4">
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700 ml-4">RT</label>
                    <input type="text" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" value="11">
                </div>
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700 ml-4">RW</label>
                    <input type="text" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" value="3">
                </div>
            </div>
            <div class="space-y-1 mb-4">
                <label class="text-sm font-medium text-gray-700 ml-4">Kecamatan</label>
                <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all"><option>BALEENDAH</option></select>
            </div>
            <div class="space-y-1">
                <label class="text-sm font-medium text-gray-700 ml-4">Desa</label>
                <select class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all"><option>RANCAMANYAR</option></select>
            </div>
        </div>

        <button onclick="location.href='pendaftaran.html'" class="w-full bg-[#007AFF] hover:bg-[#0051B3] active:bg-[#004099] text-white font-semibold py-4 px-8 rounded-full shadow-lg shadow-blue-500/30 transition-all duration-200 active:scale-95 focus:ring-2 focus:ring-offset-2 focus:ring-[#007AFF] outline-none mt-4">
            <i class="fa-solid fa-floppy-disk mr-2"></i> Simpan Keluarga
        </button>
    </div>

</div>

</body>
</html>
