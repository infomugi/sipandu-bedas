<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .login-page-container {
            max-width: 414px;
            margin: 0 auto;
            background: linear-gradient(160deg, #064e3b 0%, #059669 50%, #10b981 100%);
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .login-page-container {
                height: 850px;
                margin-top: 2rem;
                margin-bottom: 2rem;
                border-radius: 40px;
                border: 12px solid #0f172a;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            }
        }

        .login-hero {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 10;
        }

        .sparkle {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            animation: pulse-soft 2s infinite alternate;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            filter: blur(1px);
        }

        .login-bottom-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 2.5rem 1.75rem;
            z-index: 20;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        @media (min-width: 640px) {
            .login-bottom-card {
                border-radius: 30px 30px 24px 24px;
            }
        }

        .auth-form-input {
            width: 100%;
            background-color: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            padding: 1rem 1.25rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #1e293b;
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }
        .auth-form-input:focus {
            border-color: #10b981;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .auth-form-input::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }

        .auth-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .btn-connect {
            width: 100%;
            background: #059669;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 1rem;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.25);
            font-family: inherit;
        }
        .btn-connect:hover {
            background: #047857;
            box-shadow: 0 6px 16px rgba(5, 150, 105, 0.3);
        }
        .btn-connect:active {
            transform: scale(0.98);
        }

        .btn-social {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            padding: 0.875rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-social:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }
        .btn-social:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.8125rem;
            font-weight: 500;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        .divider::before {
            margin-right: 1rem;
        }
        .divider::after {
            margin-left: 1rem;
        }
        
        .back-btn-top {
            position: absolute;
            top: 2rem;
            left: 1.5rem;
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            z-index: 30;
            transition: all 0.2s;
        }
        .back-btn-top:active {
            transform: scale(0.95);
        }

        @keyframes pulse-soft {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body class="antialiased">

<div class="login-page-container">

    <button onclick="location.href='index.html'" class="back-btn-top">
        <i class="fa-solid fa-chevron-left" style="font-size: 1.125rem;"></i>
    </button>

    <!-- Hero Section -->
    <div class="login-hero">
        <i class="fa-solid fa-plus sparkle" style="top: 15%; left: 20%; font-size: 1rem; transform: rotate(45deg);"></i>
        <i class="fa-solid fa-star sparkle" style="top: 25%; right: 25%; font-size: 0.75rem;"></i>
        <i class="fa-solid fa-plus sparkle" style="bottom: 30%; left: 15%; font-size: 0.875rem;"></i>
        <i class="fa-solid fa-star sparkle" style="bottom: 20%; right: 15%; font-size: 1.125rem;"></i>
        
        <div class="cloud" style="width: 140px; height: 50px; top: 12%; right: -20px;"></div>
        <div class="cloud" style="width: 90px; height: 35px; top: 8%; right: 40px;"></div>
        <div class="cloud" style="width: 160px; height: 60px; top: 22%; left: -40px;"></div>

        <div style="width: 180px; height: 180px; position: relative; z-index: 10;" class="animate-fade-in">
            <img src="sipandu_bedas_logo_mockup_1773292640405.png" alt="Sipandu Bedas" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 12px 20px rgba(0,0,0,0.15));">
        </div>
        
        <div style="position: absolute; top: 55%; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.25); z-index: 5;"></div>
    </div>

    <!-- Login Form Card -->
    <div class="login-bottom-card animate-fade-in" style="animation-delay: 0.1s;">
        <h1 style="font-size: 1.75rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -0.02em;">Masuk</h1>
        <p style="font-size: 0.875rem; color: #64748b; margin-bottom: 1.75rem; font-weight: 500;">
            Dengan masuk, Anda menyetujui <a href="#" style="color: #0f172a; font-weight: 700; text-decoration: none;">Syarat Ketentuan</a> kami.
        </p>

        <form action="index.html" method="GET">
            <div class="space-y-1 mb-5">
                <label class="text-sm font-medium text-gray-700 ml-4">NIK / Username</label>
                <input type="text" placeholder="Masukkan NIK atau username" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all">
            </div>

            <div class="space-y-1 mb-7 relative">
                <label class="text-sm font-medium text-gray-700 ml-4">Password</label>
                <input type="password" id="passwordInput" placeholder="Masukkan password" class="w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" style="padding-right: 3rem;">
                <button type="button" onclick="togglePassword()" style="position: absolute; right: 1.25rem; bottom: 1rem; background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0;">
                    <i id="eyeIcon" class="fa-regular fa-eye" style="font-size: 1.125rem;"></i>
                </button>
            </div>

            <button type="button" onclick="location.href='index.html'" class="w-full bg-ios-primary hover:bg-ios-primary-hover active:bg-ios-primary-active text-white font-semibold py-4 px-8 rounded-full shadow-lg shadow-ios-blue transition-all duration-200 active:scale-95">
                Masuk
            </button>
        </form>

        <div style="display: flex; justify-content: center; margin-top: 1.5rem;">
            <button type="button" onclick="location.href='forgot-password.html'" style="background: none; border: none; color: #059669; font-size: 0.875rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: color 0.2s;">Lupa Password?</button>
        </div>

        <p style="text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 2.25rem; font-weight: 500;">
            Untuk informasi lebih lanjut, silakan lihat <a href="#" style="color: #0f172a; font-weight: 700; text-decoration: none;">Kebijakan Privasi</a> kami.
        </p>
    </div>

</div>

<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

</body>
</html>
