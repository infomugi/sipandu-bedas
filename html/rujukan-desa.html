<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Rujukan Desa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">
    <div class="view-screen">
        <!-- Header -->
        <header class=" bg-white/90 backdrop-blur-xl border-b border-gray-200/50 sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
            <button onclick="history.back()" class="btn-back" aria-label="Kembali">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 class="page-title">Rujukan Dinas</h2>
                <p class="page-subtitle">Penerbitan Surat Pengantar</p>
            </div>
        </header>

        <main class="view-content" style="padding:1.25rem;">
            <!-- Process Stepper -->
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem;overflow-x:auto;padding-bottom:0.5rem;">
                <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
                    <div class="stat-icon" style="background:#059669;color:white;width:1.5rem;height:1.5rem;font-size:0.75rem;font-weight:800;">1</div>
                    <span style="font-size:0.625rem;font-weight:700;color:#0f172a;text-transform:uppercase;">Cetak</span>
                </div>
                <div style="width:1.5rem;height:1px;background:#e2e8f0;flex-shrink:0;"></div>
                <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
                    <div class="stat-icon" style="background:#f1f5f9;color:#94a3b8;width:1.5rem;height:1.5rem;font-size:0.75rem;font-weight:800;">2</div>
                    <span style="font-size:0.625rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">TTD</span>
                </div>
                <div style="width:1.5rem;height:1px;background:#e2e8f0;flex-shrink:0;"></div>
                <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
                    <div class="stat-icon" style="background:#f1f5f9;color:#94a3b8;width:1.5rem;height:1.5rem;font-size:0.75rem;font-weight:800;">3</div>
                    <span style="font-size:0.625rem;font-weight:700;color:#94a3b8;text-transform:uppercase;">Upload</span>
                </div>
            </div>

            <!-- Format Surat Card -->
            <section style="margin-bottom:2rem;">
                <p class="form-label">Format Surat Pengantar</p>
                <div class="card" style="display:flex;align-items:center;gap:1rem;cursor:pointer;">
                    <div class="stat-icon" style="background:#fff1f2;color:#e11d48;">
                        <i class="fa-solid fa-file-pdf"></i>
                    </div>
                    <div style="flex:1;">
                        <h4 style="font-size:0.8125rem;font-weight:800;color:#1e293b;">Format_Rujukan.pdf</h4>
                        <p class="caption-text">Draf otomatis dari sistem</p>
                    </div>
                    <i class="fa-solid fa-download" style="color:#cbd5e1;"></i>
                </div>
            </section>

            <!-- Form Upload -->
            <form>
                <div class="form-group">
                    <label class="form-label">Nomor Surat Pengantar</label>
                    <input type="text" class=" w-full px-6 py-4 bg-white/80 rounded-2xl border border-gray-200 focus:border-[#007AFF] focus:ring-2 focus:ring-[#007AFF]/20 outline-none transition-all" placeholder="Cth: 460/12/DS/III/2026">
                </div>

                <div class="form-group">
                    <label class="form-label">Upload Berkas Ter-TTD</label>
                    <div class="upload-area" onclick="document.getElementById('fileRujukan').click()">
                        <div class="stat-icon" style="background:#ecfdf5;color:#059669;width:3rem;height:3rem;">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                        </div>
                        <span class="caption-text" style="font-weight:700;color:#475569;">Pilih File Scan / Foto</span>
                        <p class="caption-text">PNG, JPG, PDF (Max 5MB)</p>
                    </div>
                    <input type="file" id="fileRujukan" class="step-hidden">
                </div>

                <div class="info-box info-box-amber" style="margin-top:1.5rem;margin-bottom:2rem;">
                    <p style="font-size:0.75rem;color:#92400e;font-weight:600;line-height:1.5;">
                        <i class="fa-solid fa-circle-info mr-1"></i> Setelah dikirim, laporan akan diverifikasi berjenjang oleh Kecamatan & Kabupaten.
                    </p>
                </div>

                <button type="button" onclick="location.href='index.html'" class=" bg-[#007AFF] hover:bg-[#0051B3] active:bg-[#004099] text-white font-semibold py-4 px-8 rounded-full shadow-lg shadow-blue-500/30 transition-all duration-200 active:scale-95">
                    <i class="fa-solid fa-check-double"></i> Kirim Rujukan Ke Dinas
                </button>
            </form>
        </main>
    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button class="nav-item active">
            <i class="fa-solid fa-clipboard-check"></i>
            <span>Verifikasi</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-user-circle"></i>
            <span>Profil</span>
        </button>
    </nav>

</body>
</html>
