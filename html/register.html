<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Registrasi Akun</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="antialiased">

<div class="app-container-auth">

    <div style="position:absolute;top:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05);"></div>

    <div class="auth-card animate-fade-in" style="max-width:360px;">
        <header style="text-align:center;margin-bottom:1.5rem;">
            <div style="width:3rem;height:3rem;border-radius:0.875rem;background:linear-gradient(135deg,#059669,#10b981);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                <i class="fa-solid fa-user-plus" style="color:white;font-size:1.125rem;"></i>
            </div>
            <h2 style="font-size:1.375rem;font-weight:800;color:#0f172a;">Registrasi Akun</h2>
            <p class="caption-text" style="margin-top:0.375rem;line-height:1.5;">Isi data berikut untuk membuat akun Kader Posyandu Tingkat RW</p>
        </header>

        <div style="display:flex;flex-direction:column;gap:0;">
            <div class="form-group" style="margin-top:0;">
                <label class="form-label">NIK</label>
                <input type="text" class="form-input-auth" placeholder="Masukkan NIK">
            </div>
            <div class="form-group">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-input-auth" placeholder="Masukkan nama lengkap">
            </div>
            <div class="form-group">
                <label class="form-label">Jenis Kelamin</label>
                <select class="form-input-auth">
                    <option value="" disabled selected>Pilih Jenis Kelamin</option>
                    <option>Laki-laki</option>
                    <option>Perempuan</option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">Tempat Lahir</label>
                    <input type="text" class="form-input-auth" placeholder="Tempat lahir">
                </div>
                <div class="form-group">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" class="form-input-auth">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">No. HP / WhatsApp</label>
                <input type="tel" class="form-input-auth" placeholder="08xxxxxxxxxx">
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">Kecamatan</label>
                    <select class="form-input-auth">
                        <option value="" disabled selected>-- Pilih --</option>
                        <option>Baleendah</option>
                        <option>Ciparay</option>
                        <option>Pacet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Desa / Kelurahan</label>
                    <select class="form-input-auth">
                        <option value="" disabled selected>-- Pilih --</option>
                        <option>Rancamanyar</option>
                        <option>Andir</option>
                        <option>Baleendah</option>
                    </select>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">RT</label>
                    <input type="text" class="form-input-auth" placeholder="RT">
                </div>
                <div class="form-group">
                    <label class="form-label">RW</label>
                    <input type="text" class="form-input-auth" placeholder="RW">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input-auth" placeholder="Buat password">
            </div>
            <div class="form-group">
                <label class="form-label">Konfirmasi Password</label>
                <input type="password" class="form-input-auth" placeholder="Ulangi password">
            </div>
            
            <button onclick="location.href='login.html'" class="btn-dark" style="margin-top:1.5rem;">
                <i class="fa-solid fa-user-check"></i> Daftar
            </button>

            <div style="text-align:center;margin-top:1rem;">
                <button onclick="location.href='login.html'" class="btn-ghost btn-ghost-brand" style="font-size:0.8125rem;">Sudah punya akun? Login</button>
            </div>
        </div>
    </div>

</div>

<script src="assets/js/ios-ui.js"></script>
</body>
</html>
