<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Daftar Keluarga</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <!-- Header -->
    <header class="header-white">
        <h2 class="page-title">Daftar Keluarga</h2>
        <button onclick="location.href='tambah-keluarga.html'" class="btn-small" style="background:linear-gradient(135deg,#059669,#10b981);color:white;box-shadow:0 4px 12px rgba(16,185,129,0.25);">
            <i class="fa-solid fa-plus" style="font-size:0.625rem;"></i> Tambah
        </button>
    </header>

    <div class="view-content" style="padding:1.25rem;padding-bottom:90px;">
        <!-- Search -->
        <div style="margin-bottom:1.25rem;">
            <div style="position:relative;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:0.8125rem;"></i>
                <input type="text" class="form-input" placeholder="Cari berdasarkan No KK atau NIK..." style="padding-left:2.5rem;">
            </div>
        </div>

        <!-- Family List -->
        <div style="display:flex;flex-direction:column;gap:0.875rem;">
            
            <!-- Card 1 -->
            <div class="family-card">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.875rem;">
                    <div>
                        <p style="font-size:0.875rem;font-weight:700;color:#0f172a;">HANSAH DARMAWAN</p>
                        <p style="font-size:0.75rem;color:#94a3b8;font-weight:500;margin-top:0.125rem;">KK: 3204320305940004</p>
                    </div>
                    <span class="chip chip-emerald"><i class="fa-solid fa-circle" style="font-size:0.375rem;"></i> RT 3 / RW 11</span>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
                    <div style="display:flex;align-items:center;gap:0.375rem;">
                        <i class="fa-regular fa-id-card" style="font-size:0.6875rem;color:#94a3b8;"></i>
                        <span style="font-size:0.75rem;color:#64748b;font-weight:500;">NIK: 3204320305940004</span>
                    </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:1px solid #f1f5f9;">
                    <div style="display:flex;align-items:center;gap:0.375rem;">
                        <i class="fa-regular fa-calendar" style="font-size:0.625rem;color:#94a3b8;"></i>
                        <span style="font-size:0.75rem;color:#94a3b8;font-weight:500;">Kunjungan: 25-08-2025</span>
                    </div>
                    <div style="display:flex;gap:0.5rem;">
                        <button onclick="location.href='spm-menu.html'" class="btn-small" style="background:#ecfdf5;color:#059669;">
                            <i class="fa-solid fa-play" style="font-size:0.5rem;"></i> SPM
                        </button>
                        <button class="btn-small" style="background:#f1f5f9;color:#64748b;">
                            <i class="fa-solid fa-circle-info" style="font-size:0.5rem;"></i> Info
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="family-card">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.875rem;">
                    <div>
                        <p style="font-size:0.875rem;font-weight:700;color:#0f172a;">ATANG OKTAVIANA</p>
                        <p style="font-size:0.75rem;color:#94a3b8;font-weight:500;margin-top:0.125rem;">KK: 3204320432030594</p>
                    </div>
                    <span class="chip chip-emerald"><i class="fa-solid fa-circle" style="font-size:0.375rem;"></i> RT 5 / RW 11</span>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
                    <div style="display:flex;align-items:center;gap:0.375rem;">
                        <i class="fa-regular fa-id-card" style="font-size:0.6875rem;color:#94a3b8;"></i>
                        <span style="font-size:0.75rem;color:#64748b;font-weight:500;">NIK: 3504320305940111</span>
                    </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:1px solid #f1f5f9;">
                    <div style="display:flex;align-items:center;gap:0.375rem;">
                        <i class="fa-regular fa-calendar" style="font-size:0.625rem;color:#94a3b8;"></i>
                        <span style="font-size:0.75rem;color:#94a3b8;font-weight:500;">Kunjungan: 26-08-2025</span>
                    </div>
                    <div style="display:flex;gap:0.5rem;">
                        <button onclick="location.href='tambah-kunjungan.html'" class="btn-small" style="background:#ecfdf5;color:#059669;">
                            <i class="fa-solid fa-plus" style="font-size:0.5rem;"></i> Hadir
                        </button>
                        <button class="btn-small" style="background:#f1f5f9;color:#64748b;">
                            <i class="fa-solid fa-circle-info" style="font-size:0.5rem;"></i> Info
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Pagination -->
        <div class="pagination">
            <button class="page-btn"><i class="fa-solid fa-chevron-left" style="font-size:0.625rem;"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn"><i class="fa-solid fa-chevron-right" style="font-size:0.625rem;"></i></button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button class="nav-item active">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-user-circle"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
