<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Daftar Keluarga</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Premium Header */
        .header-premium-nav {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            padding: 2.5rem 1.25rem 5.5rem 1.25rem;
            color: white;
            position: relative;
            z-index: 10;
        }

        /* Decorative Background Elements in Header */
        .header-premium-nav::before {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .header-premium-nav::after {
            content: '';
            position: absolute;
            bottom: -30px; left: -20px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        /* Floating Search */
        .search-wrapper {
            margin-top: -2rem;
            position: relative;
            z-index: 20;
            padding: 0 1.25rem;
            margin-bottom: 1.5rem;
        }
        
        .search-input {
            width: 100%;
            background: #ffffff;
            border-radius: 1rem;
            padding: 0.85rem 1rem 0.85rem 3rem;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.05);
            outline: none;
            transition: all 0.2s ease;
            color: #1e293b;
        }
        
        .search-input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        
        .search-input:focus {
            box-shadow: 0 4px 15px -3px rgba(16, 185, 129, 0.15), 0 0 0 2px rgba(16, 185, 129, 0.1);
            border-color: #34d399;
        }

        .search-icon {
            position: absolute;
            left: 2.35rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.2s ease;
        }
        
        .search-input:focus + .search-icon,
        .search-wrapper:focus-within .search-icon {
            color: #059669;
        }

        /* Compact Pro Card */
        .pro-card-compact {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .pro-card-compact:hover {
            transform: scale(0.98);
        }
        
        /* Subtle Indicator on Hover */
        .pro-card-compact::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: #10b981;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .pro-card-compact:hover::before {
            opacity: 1;
        }

        /* Compact Avatar */
        .avatar-compact {
            width: 40px;
            height: 40px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: #059669;
            background: #ecfdf5;
            flex-shrink: 0;
            border: 1px solid #d1fae5;
        }

        /* Compact Chip */
        .chip-compact {
            background: #ecfdf5;
            color: #059669;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.65rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid #d1fae5;
            white-space: nowrap;
        }

        /* Compact Info Row */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        
        .date-badge {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: #f8fafc;
            padding: 0.35rem 0.6rem;
            border-radius: 0.5rem;
            border: 1px solid #f1f5f9;
        }

        /* Compact Action Buttons */
        .btn-compact {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.45rem 0.75rem;
            border-radius: 0.65rem;
            font-size: 0.7rem;
            font-weight: 700;
            transition: all 0.15s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .btn-green {
            background: #ecfdf5;
            color: #059669;
        }
        
        .btn-green:hover, .btn-green:active {
            background: #d1fae5;
        }
        
        .btn-gray {
            background: white;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        
        .btn-gray:hover, .btn-gray:active {
            background: #f8fafc;
            color: #475569;
        }

        /* Animating List */
        .stagger-1 { animation: fadeIn 0.3s ease forwards; animation-delay: 0.05s; opacity: 0; }
        .stagger-2 { animation: fadeIn 0.3s ease forwards; animation-delay: 0.1s; opacity: 0; }
        .stagger-3 { animation: fadeIn 0.3s ease forwards; animation-delay: 0.15s; opacity: 0; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .page-btn-active {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 10px -2px rgba(16, 185, 129, 0.3);
        }
        
        .page-btn-outline {
            background: white;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="antialiased text-slate-800 pb-20">

<div class="app-container max-w-md mx-auto bg-[#f8fafc] min-h-screen relative shadow-xl overflow-hidden shadow-slate-200/50 block">

    <!-- Header Section -->

    <!-- Content Area -->
    <div class="px-3.5 pb-8">

        <div class="search-wrapper">

        <!-- Section Title & Filter -->

            </div>
            <button class="text-[var(--ios-green)] bg-[rgba(52,199,89,0.1)] border border-[rgba(52,199,89,0.2)] px-2.5 py-1.5 rounded-[0.6rem] text-[10px] font-bold hover:bg-[rgba(52,199,89,0.2)] transition-colors flex items-center gap-1.5 shrink-0 focus:outline-none focus:ring-2 focus:ring-[var(--ios-green)] focus:ring-offset-2">
                <i class="fa-solid fa-arrow-up-wide-short"></i> Filter

        </div>

        <!-- Family List Container -->
        <div class="space-y-2.5">
            <!-- Card 1 -->
            <div class="pro-card-compact stagger-1">
                <div class="flex gap-3 items-start">
                    <div class="avatar-compact">AS</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-[var(--ios-gray-900)] text-[14px] leading-tight truncate">Angga Sura Sendana</h3>
                            <div class="chip-compact shrink-0 bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] border-transparent">
                                <i class="fa-solid fa-location-dot text-[8px]"></i> RW 11
                            </div>
                        </div>
                        <p class="text-[11px] text-[var(--ios-gray-500)] font-medium flex items-center gap-1.5 mt-1">
                            <i class="fa-regular fa-id-card text-[var(--ios-gray-400)]"></i> 3204320305940004
                        </p>
                    </div>
                </div>
                
                <div class="info-row pt-2 border-t border-[var(--ios-gray-200)] mt-1">
                    <div class="date-badge bg-[var(--ios-gray-100)] border-[var(--ios-gray-200)]">
                        <i class="fa-regular fa-calendar-check text-[var(--ios-green)] text-[10px]"></i>
                        <span class="text-[10px] text-[var(--ios-gray-600)] font-bold whitespace-nowrap">25 Ags 2025</span>
                    </div>
                    <div class="flex gap-1.5">
                        <button aria-label="SPM" onclick="location.href='spm-menu.html'" class="btn-compact bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] hover:bg-[rgba(52,199,89,0.2)] focus:outline-none focus:ring-2 focus:ring-[var(--ios-green)] focus:ring-offset-2">
                            <i class="fa-solid fa-notes-medical"></i> SPM
                        </button>
                        <button aria-label="Detail" class="btn-compact bg-transparent text-[var(--ios-gray-600)] border border-[var(--ios-gray-200)] hover:bg-[var(--ios-gray-100)] focus:outline-none focus:ring-2 focus:ring-[var(--ios-gray-400)] focus:ring-offset-2">
                            <i class="fa-regular fa-eye"></i> Detail
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="pro-card-compact stagger-2">
                <div class="flex gap-3 items-start">
                    <div class="avatar-compact">AO</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-[var(--ios-gray-900)] text-[14px] leading-tight truncate">Atang Oktaviana</h3>
                            <div class="chip-compact shrink-0 bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] border-transparent">
                                <i class="fa-solid fa-location-dot text-[8px]"></i> RW 11
                            </div>
                        </div>
                        <p class="text-[11px] text-[var(--ios-gray-500)] font-medium flex items-center gap-1.5 mt-1">
                            <i class="fa-regular fa-id-card text-[var(--ios-gray-400)]"></i> 3204320432030594

                    </div>
                </div>
                
                <div class="info-row pt-2 border-t border-[var(--ios-gray-200)] mt-1">
                    <div class="date-badge bg-[var(--ios-gray-100)] border-[var(--ios-gray-200)]">

                    </div>
                    <div class="flex gap-1.5">
                        <button aria-label="Hadir" onclick="location.href='tambah-kunjungan.html'" class="btn-compact bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] hover:bg-[rgba(52,199,89,0.2)] focus:outline-none focus:ring-2 focus:ring-[var(--ios-green)] focus:ring-offset-2">
                            <i class="fa-solid fa-hand-holding-hand"></i> Hadir
                        </button>
                        <button aria-label="Detail" class="btn-compact bg-transparent text-[var(--ios-gray-600)] border border-[var(--ios-gray-200)] hover:bg-[var(--ios-gray-100)] focus:outline-none focus:ring-2 focus:ring-[var(--ios-gray-400)] focus:ring-offset-2">
                            <i class="fa-regular fa-eye"></i> Detail
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Card 3 -->
            <div class="pro-card-compact stagger-3">
                <div class="flex gap-3 items-start">
                    <div class="avatar-compact">SM</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-[var(--ios-gray-900)] text-[14px] leading-tight truncate">Siti Maimunah</h3>
                            <div class="chip-compact shrink-0 bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] border-transparent">
                                <i class="fa-solid fa-location-dot text-[8px]"></i> RW 11
                            </div>
                        </div>
                        <p class="text-[11px] text-[var(--ios-gray-500)] font-medium flex items-center gap-1.5 mt-1">
                            <i class="fa-regular fa-id-card text-[var(--ios-gray-400)]"></i> 3204320432030612
                        </p>
                    </div>
                </div>
                
                <div class="info-row pt-2 border-t border-[var(--ios-gray-200)] mt-1">
                    <div class="date-badge bg-[var(--ios-gray-100)] border-[var(--ios-gray-200)]">

                        <span class="text-[10px] text-[var(--ios-gray-600)] font-bold whitespace-nowrap">27 Ags 2025</span>
                    </div>
                    <div class="flex gap-1.5">
                        <button aria-label="SPM" onclick="location.href='spm-menu.html'" class="btn-compact bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] hover:bg-[rgba(52,199,89,0.2)] focus:outline-none focus:ring-2 focus:ring-[var(--ios-green)] focus:ring-offset-2">
                            <i class="fa-solid fa-notes-medical"></i> SPM
                        </button>
                        <button aria-label="Detail" class="btn-compact bg-transparent text-[var(--ios-gray-600)] border border-[var(--ios-gray-200)] hover:bg-[var(--ios-gray-100)] focus:outline-none focus:ring-2 focus:ring-[var(--ios-gray-400)] focus:ring-offset-2">

        </div>

        <!-- Pagination -->
        <div class="flex justify-center gap-2 mt-6">
            <button class="page-btn page-btn-outline"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
