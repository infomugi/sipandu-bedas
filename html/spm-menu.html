<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Layanan SPM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .header-premium-nav {
            background: linear-gradient(180deg, #064e3b 0%, #065f46 100%);
            padding: 4rem 1.5rem 2rem 1.5rem;
            color: white;
            position: relative;
        }
        .pro-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
            padding: 1.25rem;
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 1.25rem;
            width: 100%;
            text-align: left;
            transition: transform 0.2s;
        }
        .pro-card:active {
            transform: scale(0.98);
        }
        .spm-icon-box {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .info-pill {
            background: rgba(6, 78, 59, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 1.25rem;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

<div class="app-container">

    <!-- Header Section -->
    <header class="header-premium-nav">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md">
                <i class="fa-solid fa-chevron-left text-white"></i>
            </button>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-white">6 Standar Pelayanan Minimal</h1>
                <p class="text-[10px] text-emerald-400 font-bold opacity-80 uppercase tracking-widest">Pilih Jenis Layanan</p>
            </div>
        </div>

        <div class="info-pill">
            <div class="w-10 h-10 rounded-full border-2 border-emerald-500/30 p-0.5">
                <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-full h-full object-cover rounded-full">
            </div>
            <div>
                <p class="text-[10px] text-white/40 font-bold uppercase tracking-wider">Keluarga Target</p>
                <p class="text-xs font-bold text-white">Atang Oktaviana</p>
            </div>
        </div>
    </header>

    <div class="view-content px-5 pt-6 pb-24">
        
        <div class="grid grid-cols-1 gap-4">
            <!-- SPM Pendidikan -->
            <button onclick="location.href='spm-pendidikan.html'" class="pro-card">
                <div class="spm-icon-box bg-emerald-50 text-emerald-600">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800">Pendidikan</h3>
                    <p class="text-[10px] text-slate-400 font-medium leading-relaxed mt-0.5">Layanan bantuan pendidikan & perlengkapan sekolah</p>
                </div>
            </button>

            <!-- SPM Kesehatan -->
            <button onclick="location.href='spm-kesehatan.html'" class="pro-card">
                <div class="spm-icon-box bg-rose-50 text-rose-600">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800">Kesehatan</h3>
                    <p class="text-[10px] text-slate-400 font-medium leading-relaxed mt-0.5">Layanan kesehatan dasar bagi keluarga tidak mampu</p>
                </div>
            </button>

            <!-- SPM Pekerjaan Umum -->
            <button onclick="location.href='spm-pu.html'" class="pro-card">
                <div class="spm-icon-box bg-blue-50 text-blue-600">
                    <i class="fa-solid fa-faucet-drip"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800">Pekerjaan Umum</h3>
                    <p class="text-[10px] text-slate-400 font-medium leading-relaxed mt-0.5">Akses air minum & pengolahan air limbah domestik</p>
                </div>
            </button>

            <!-- SPM Perumahan -->
            <button onclick="location.href='spm-perumahan.html'" class="pro-card">
                <div class="spm-icon-box bg-amber-50 text-amber-600">
                    <i class="fa-solid fa-house-chimney-crack"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800">Perumahan Rakyat</h3>
                    <p class="text-[10px] text-slate-400 font-medium leading-relaxed mt-0.5">Bantuan renovasi rumah tidak layak huni (Rutilahu)</p>
                </div>
            </button>

            <!-- SPM Trantibumlinmas -->
            <button onclick="location.href='spm-trantibum.html'" class="pro-card">
                <div class="spm-icon-box bg-slate-50 text-slate-600">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800">Trantibumlinmas</h3>
                    <p class="text-[10px] text-slate-400 font-medium leading-relaxed mt-0.5">Perlindungan masyarakat dari gangguan ketertiban</p>
                </div>
            </button>

            <!-- SPM Sosial -->
            <button onclick="location.href='spm-sosial.html'" class="pro-card">
                <div class="spm-icon-box bg-purple-50 text-purple-600">
                    <i class="fa-solid fa-hands-holding-child"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800">Sosial</h3>
                    <p class="text-[10px] text-slate-400 font-medium leading-relaxed mt-0.5">Bantuan bagi disabilitas, lansia, & anak terlantar</p>
                </div>
            </button>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
