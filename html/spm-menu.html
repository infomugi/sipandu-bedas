<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - Layanan SPM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="antialiased">

<div class="app-container">

    <!-- Header Section (iOS Navigation Bar) -->
    <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-200/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()" class="p-2 rounded-full hover:bg-gray-100 active:bg-gray-200 transition-colors focus-ring">
                        <i class="fa-solid fa-chevron-left text-[var(--ios-blue)]"></i>
                    </button>
                    <h1 class="text-xl font-semibold bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">
                        Layanan SPM
                    </h1>
                </div>
            </div>
        </div>
    </nav>

    <!-- Info Pill iOS Style -->
    <div class="px-5 mt-4">
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-full border border-gray-200 p-0.5 shadow-sm">
                <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-full h-full object-cover rounded-full">
            </div>
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Keluarga Target</p>
                <p class="text-sm font-bold text-gray-900 leading-tight">Atang Oktaviana</p>
            </div>
        </div>
    </div>

    <div class="view-content px-5 pt-6 pb-32">
        
        <div class="grid grid-cols-1 gap-4">
            <!-- SPM Pendidikan -->
            <button onclick="location.href='spm-pendidikan.html'" class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4 transition-transform hover:scale-[0.98] active:scale-95 focus-ring">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-[rgba(52,199,89,0.1)] text-[var(--ios-green)] shrink-0">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-[15px] font-semibold text-gray-900">Pendidikan</h3>
                    <p class="text-[12px] text-gray-500 leading-tight mt-0.5">Layanan bantuan pendidikan & perlengkapan sekolah</p>
                </div>
            </button>

            <!-- SPM Kesehatan -->
            <button onclick="location.href='spm-kesehatan.html'" class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4 transition-transform hover:scale-[0.98] active:scale-95 focus-ring">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-[rgba(255,59,48,0.1)] text-[var(--ios-red)] shrink-0">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-[15px] font-semibold text-gray-900">Kesehatan</h3>
                    <p class="text-[12px] text-gray-500 leading-tight mt-0.5">Layanan kesehatan dasar bagi keluarga tidak mampu</p>
                </div>
            </button>

            <!-- SPM Pekerjaan Umum -->
            <button onclick="location.href='spm-pu.html'" class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4 transition-transform hover:scale-[0.98] active:scale-95 focus-ring">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-[rgba(0,122,255,0.1)] text-[var(--ios-blue)] shrink-0">
                    <i class="fa-solid fa-faucet-drip"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-[15px] font-semibold text-gray-900">Pekerjaan Umum</h3>
                    <p class="text-[12px] text-gray-500 leading-tight mt-0.5">Akses air minum & pengolahan air limbah domestik</p>
                </div>
            </button>

            <!-- SPM Perumahan -->
            <button onclick="location.href='spm-perumahan.html'" class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4 transition-transform hover:scale-[0.98] active:scale-95 focus-ring">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-[rgba(255,149,0,0.1)] text-[var(--ios-orange)] shrink-0">
                    <i class="fa-solid fa-house-chimney-crack"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-[15px] font-semibold text-gray-900">Perumahan Rakyat</h3>
                    <p class="text-[12px] text-gray-500 leading-tight mt-0.5">Bantuan renovasi rumah tidak layak huni (Rutilahu)</p>
                </div>
            </button>

            <!-- SPM Trantibumlinmas -->
            <button onclick="location.href='spm-trantibum.html'" class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4 transition-transform hover:scale-[0.98] active:scale-95 focus-ring">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-[rgba(142,142,147,0.1)] text-[var(--ios-gray-600)] shrink-0">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-[15px] font-semibold text-gray-900">Trantibumlinmas</h3>
                    <p class="text-[12px] text-gray-500 leading-tight mt-0.5">Perlindungan masyarakat dari gangguan ketertiban</p>
                </div>
            </button>

            <!-- SPM Sosial -->
            <button onclick="location.href='spm-sosial.html'" class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-lg shadow-black/5 border border-white/20 p-4 flex items-center gap-4 transition-transform hover:scale-[0.98] active:scale-95 focus-ring">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-[rgba(175,82,222,0.1)] text-[var(--ios-purple)] shrink-0">
                    <i class="fa-solid fa-hands-holding-child"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-[15px] font-semibold text-gray-900">Sosial</h3>
                    <p class="text-[12px] text-gray-500 leading-tight mt-0.5">Bantuan bagi disabilitas, lansia, & anak terlantar</p>
                </div>
            </button>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="location.href='index.html'" class="nav-item focus-ring rounded-lg">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </button>
        <button onclick="location.href='pendaftaran.html'" class="nav-item focus-ring rounded-lg">
            <i class="fa-solid fa-users"></i>
            <span>Keluarga</span>
        </button>
        <button onclick="location.href='riwayat-pengajuan.html'" class="nav-item focus-ring rounded-lg">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="location.href='laporan.html'" class="nav-item focus-ring rounded-lg">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Laporan</span>
        </button>
        <button onclick="location.href='profil.html'" class="nav-item focus-ring rounded-lg">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profil</span>
        </button>
    </nav>

</div>

</body>
</html>
