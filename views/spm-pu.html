<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sipandu Bedas - SPM Pekerjaan Umum</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <div class="view-screen" style="background:#f8fafc;display:flex;flex-direction:column;">
        <header class="header-white-nav">
            <button onclick="location.href='spm-menu.html'" class="btn-back" aria-label="Kembali">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 class="page-title">SPM Pekerjaan Umum</h2>
                <p class="page-subtitle">Sanitasi, MCK, dan Sarana Air Bersih</p>
            </div>
        </header>

        <main style="flex:1;overflow-y:auto;padding:1.25rem;padding-bottom:2rem;">
            <div class="form-group" style="margin-top:0;">
                <label class="form-label">Jenis Kebutuhan / Keluhan</label>
                <select class="form-input">
                    <option>Pembangunan Sanitasi / Septic Tank</option>
                    <option>Pembangunan MCK Umum</option>
                    <option>Penyediaan Sarana Air Bersih</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Lokasi Titik Pembangunan (RT/Dusun)</label>
                <textarea class="form-input" style="height:5rem;resize:none;" placeholder="Jelaskan detail lokasi pembangunan..."></textarea>
            </div>

            <!-- Geolocation Map -->
            <div style="margin-top:1.5rem;">
                <div class="section-separator">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Lokasi Pelayanan (GPS)</span>
                </div>
                <div class="map-container" id="map">
                    <button type="button" class="map-overlay-btn" onclick="getLocation()">
                        <i class="fa-solid fa-crosshairs"></i> Fokus Lokasi
                    </button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;">
                    <input type="text" id="lat" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Latitude" readonly>
                    <input type="text" id="lng" class="form-input" style="font-size:0.7rem;padding:0.5rem;" placeholder="Longitude" readonly>
                </div>
            </div>

            <h3 style="font-size:0.8125rem;font-weight:700;color:#1e293b;margin-top:1.5rem;margin-bottom:0.875rem;padding-bottom:0.5rem;border-bottom:1px solid #e2e8f0;">
                <i class="fa-solid fa-paperclip" style="color:#ea580c;margin-right:0.375rem;"></i> Dokumen Pendukung
            </h3>
            
            <div class="form-group" style="margin-top:0;">
                <label class="form-label">Surat Permohonan Kepala Dusun/RT</label>
                <div class="upload-area">
                    <i class="fa-solid fa-envelope-open-text" style="font-size:1.5rem;color:#fb923c;"></i>
                    <p style="font-size:0.75rem;font-weight:600;color:#94a3b8;">Ambil Foto / Pilih File</p>
                </div>
            </div>

            <button onclick="location.href='spm-menu.html'" class="btn-primary btn-accent-orange" style="margin-top:2rem;width:100%;padding:0.9375rem 1.5rem;border-radius:0.875rem;border:none;font-weight:700;font-size:0.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;font-family:'Plus Jakarta Sans',sans-serif;">
                <i class="fa-solid fa-map-location-dot"></i> Ajukan Kunjungan Lapangan
            </button>
        </main>
    </div>

</div>

<script>
    // Map & Geolocation logic
    let map, marker;
    const defaultLocation = [-7.0252, 107.6190]; // Baleendah, Bandung

    function initMap() {
        map = L.map('map').setView(defaultLocation, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        marker = L.marker(defaultLocation, {draggable: true}).addTo(map);
        
        marker.on('dragend', function() {
            const pos = marker.getLatLng();
            updateCoords(pos.lat, pos.lng);
        });

        // Try auto-locate on load
        getLocation();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const pos = [lat, lng];
                    map.setView(pos, 16);
                    marker.setLatLng(pos);
                    updateCoords(lat, lng);
                },
                () => {
                    console.log("Geolocation failed or denied.");
                }
            );
        }
    }

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat.toFixed(7);
        document.getElementById('lng').value = lng.toFixed(7);
    }

    window.onload = initMap;
</script>

</body>
</html>
