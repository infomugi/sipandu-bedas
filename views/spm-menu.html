<!DOCTYPE html>
<html lang="id">
<head>

    <title>Sipandu Bedas - 6 Layanan SPM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="antialiased" style="color:#334155;">

<div class="app-container">

    <!-- Screen: Menu 6 SPM -->
    <div class="view-screen" style="background:#f8fafc;">
        <header class="header-white-nav">
            <button onclick="location.href='index.html'" class="btn-back" aria-label="Kembali">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 class="page-title">6 Layanan SPM</h2>
                <p class="page-subtitle">Pilih bidang layanan warga</p>
            </div>
        </header>
        
        <main style="flex:1;overflow-y:auto;padding:1.25rem;padding-bottom:2rem;">
            <!-- Target Family Info -->
            <div class="info-box info-box-indigo" style="margin-bottom:1.5rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <div>

                        <p style="font-size:0.75rem;color:#6366f1;font-weight:500;margin-top:0.125rem;">KK: 3204320432030594</p>
                    </div>
                    <div style="text-align:right;">
                        <p style="font-size:0.6875rem;color:#818cf8;font-weight:600;margin-bottom:0.375rem;">Posyandu RW 11</p>
                        <span class="chip chip-emerald">Hadir Hari Ini</span>
                    </div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;">
                
                <!-- SPM Pendidikan -->
                <button onclick="location.href='spm-pendidikan.html'" class="spm-card">
                    <div class="spm-icon" style="background:#eff6ff;color:#3b82f6;">

                    </div>
                    <div>

                <button onclick="location.href='spm-kesehatan.html'" class="spm-card">

                    </div>
                    <div>
                        <p style="font-size:0.875rem;font-weight:700;color:#1e293b;">Kesehatan</p>

                <button onclick="location.href='spm-perumahan.html'" class="spm-card">
                    <div class="spm-icon" style="background:#eef2ff;color:#4f46e5;">

                    <div>

                <button onclick="location.href='spm-trantibum.html'" class="spm-card">

                <button onclick="location.href='spm-sosial.html'" class="spm-card">
                    <div class="spm-icon" style="background:#fdf2f8;color:#db2777;">
                        <i class="fa-solid fa-hands-holding-child"></i>
                    </div>
                    <div>
                        <p style="font-size:0.875rem;font-weight:700;color:#1e293b;">Sosial</p>
                        <p style="font-size:0.6875rem;color:#94a3b8;margin-top:0.25rem;">Disabilitas, Lansia, Terlantar</p>
                    </div>
